<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Mode - Nestlé NDRC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #F5F3F0; color: #1b1b18; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-center">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl max-w-md w-full border border-gray-100">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-yellow-50 text-yellow-600 rounded-3xl mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h1 class="text-3xl font-black text-gray-900 mb-2">No Connection</h1>
        <p class="text-gray-600 font-medium mb-8">
            You are currently offline. The Nestlé NDRC platform requires an active network connection to synchronize data. 
            Re-connect to continue managing your portal.
        </p>
        <button onclick="window.location.reload()" class="w-full bg-[#0085C3] text-white font-black py-4 rounded-2xl hover:opacity-90 transition-opacity">
            Retry Connection
        </button>
    </div>
</body>
</html>
